name = "Window"
description = "Focused window info"
icon = "app-window"

[source]
type = "native"
kind = "window"
interval = 1

[badges.default]
template = "{{ title | dim }}"
highlight = "{{ title }}"
condition = "{{ title }}"

[[hooks]]
condition = '{{ changed(key="title") }}'
action = "show-badge:default"
timeout = 2
