name = "Media"
icon = "play"
type = "media"

[source]
type = "native"
kind = "media"
interval = 1

[badges.default]
template = '{% if status == "Playing" %}{{ "play" | icon }}{% else %}{{ "pause" | icon }}{% endif %}'
condition = '{{ status == "Playing" }}'

[widget]
template = '{% if title %}{{ title }}{% if artist %} — {{ artist }}{% endif %}{% else %}no media{% endif %}'

[commands]
play = "playerctl play-pause"
prev = "playerctl previous"
next = "playerctl next"

[[key-hints]]
key = "p"
action = ""
label = "play/pause"

[[key-hints]]
key = "["
action = ""
label = "prev"

[[key-hints]]
key = "]"
action = ""
label = "next"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
