name = "Inputs"
description = "Microphone and audio input"
icon = "microphone"
type = "inputs"

[source]
type = "native"
kind = "inputs"
interval = 1

[badges.default]
template = '{{ "microphone-slash" | icon }}'
condition = "{{ muted }}"

[widget]
template = '{% if muted %}muted{% else %}{{ volume | meter(max=100, width=20) }}{% endif %}'

[[actions]]
name = "mute"
run = "wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle"
label = "mute"

[[actions]]
name = "up"
run = "wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+"
label = "vol up"

[[actions]]
name = "down"
run = "wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-"
label = "vol down"

[[actions]]
name = "denoise"
run = "native"
label = "denoise"

[[hooks]]
condition = '{{ changed(key="muted") }}'
action = "spotlight"
timeout = 3

[[key-hints]]
key = "←→"
action = ""
label = "select"

[[key-hints]]
key = "⏎"
action = ""
label = "default"

[[key-hints]]
key = "↑↓"
action = ""
label = "vol"

[[key-hints]]
key = "m"
action = ""
label = "mute"

[[key-hints]]
key = "n"
action = ""
label = "denoise"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
