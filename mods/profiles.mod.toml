name = "Profiles"
icon = "scales"
type = "actions"

[source]
type = "poll"
command = ["sh", "-c", """printf '{"profile":"%s"}' "$(powerprofilesctl get)" """]
interval = 5

[badges.default]
template = '{% if profile == "power-saver" %}{{ "leaf" | icon }}{% elif profile == "performance" %}{{ "lightning" | icon }}{% else %}{{ "scales" | icon }}{% endif %}'
condition = '{{ profile != "balanced" }}'

[[actions]]
name = "power-saver"
run = "powerprofilesctl set power-saver"
key = "s"
label = "saver"
icon = "leaf"

[[actions]]
name = "balanced"
run = "powerprofilesctl set balanced"
key = "b"
label = "balanced"
icon = "scales"

[[actions]]
name = "performance"
run = "powerprofilesctl set performance"
key = "p"
label = "performance"
icon = "lightning"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
