name = "Bluetooth"
icon = "bluetooth"
type = "bluetooth"

[source]
type = "native"
kind = "bluetooth"
interval = 10

[badges.default]
template = '{{ "bluetooth" | icon }}'
condition = "{{ devices | selectattr('connected', 'true') | list | length > 0 }}"

[widget]
template = '''
{% if not powered %}off{% elif devices | length == 0 %}no devices{% else %}{% for d in devices %}{% if d.connected %}{{ d.name }}{% else %}{{ d.name | dim }}{% endif %}{% if not loop.last %}  {% endif %}{% endfor %}{% endif %}'''

[[actions]]
name = "on"
run = "bluetoothctl power on"
label = "power on"

[[actions]]
name = "off"
run = "bluetoothctl power off"
label = "power off"

[[actions]]
name = "connect"
run = "bluetoothctl connect"
label = "connect"

[[actions]]
name = "disconnect"
run = "bluetoothctl disconnect"
label = "disconnect"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
