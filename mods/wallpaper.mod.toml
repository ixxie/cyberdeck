name = "Wallpaper"
description = "Browse and set wallpapers"
icon = "image"
type = "wallpaper"

[source]
type = "native"
kind = "wallpaper"
interval = 30

[params]
dir = "~/Pictures/Wallpapers"
fill = "crop"
transition = "fade"
transition-duration = "1"

[[actions]]
name = "shuffle"
run = "native"
key = "s"
label = "shuffle"

[[actions]]
name = "init"
run = "native"
label = "init"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
