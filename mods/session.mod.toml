name = "Session"
description = "Lock, logout, reboot, shutdown"
icon = "power"
type = "actions"

[source]
type = "native"
kind = "session"
interval = 10

[badges.default]
template = '{% if charging %}{{ "battery-charging" | icon }}{% elif capacity < 10 %}{{ "battery-empty" | icon }}{% elif capacity < 35 %}{{ "battery-low" | icon }}{% elif capacity < 65 %}{{ "battery-half" | icon }}{% else %}{{ "battery-full" | icon }}{% endif %}'
condition = "{{ capacity < 20 and not charging }}"

[[actions]]
name = "suspend"
run = "systemctl suspend"
key = "z"
label = "suspend"
icon = "moon"

[[actions]]
name = "shutdown"
run = "shutdown now"
key = "x"
label = "shutdown"
icon = "power"

[[actions]]
name = "reboot"
run = "shutdown -r now"
key = "r"
label = "reboot"
icon = "arrow-clockwise"

[[actions]]
name = "logout"
run = "niri msg action quit"
key = "l"
label = "logout"
icon = "sign-out"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
