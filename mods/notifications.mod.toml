name = "Notifications"
icon = "bell"
type = "notifications"

[source]
type = "native"
kind = "notifications"
interval = 2

[badges.default]
template = '{{ "bell" | icon }}'
condition = "{{ count > 0 }}"

[widget]
template = '{% if count == 0 %}no notifications{% elif count == 1 %}1 notification{% else %}{{ count }} notifications{% endif %}'

[commands]
clear = "cyberdeck notifications clear"

[[key-hints]]
key = "←→"
action = ""
label = "scroll"

[[key-hints]]
key = "d"
action = ""
label = "dismiss"

[[key-hints]]
key = "c"
action = ""
label = "clear"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
