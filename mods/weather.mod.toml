name = "Weather"
description = "Local weather forecast"
icon = "cloud"

[source]
type = "native"
kind = "weather"
interval = 600

[badges.default]
template = '{{ weather_icon | icon }}'
condition = "{{ code >= 51 or temp_c > 35 or temp_c < 0 or wind_kph > 50 }}"

[widget]
template = '{{ weather_icon | icon }} {{ weather_label }}|||{{ temp_icon | icon }} {{ temp_c }}°C ({{ feels_like_c }}°C)|||{{ "drop" | icon }} {{ humidity }}%|||{{ "wind" | icon }} {{ wind_kph }} km/h{% if rainfall_max > 0 %}|||{{ "cloud-rain" | icon }} {{ rainfall | sparkline }} {{ rainfall_max }}mm{% endif %}{% if location %}|||{{ "map-pin" | icon }} {{ location }}{% endif %}'

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
