name = "Weather"
icon = "cloud"

[source]
type = "native"
kind = "weather"
interval = 600

[badges.default]
template = '{% if code == 113 %}{{ "sun" | icon }}{% elif code == 116 or code == 119 or code == 122 %}{{ "cloud" | icon }}{% else %}{{ "cloud" | icon }}{% endif %}'
condition = "{{ code > 200 or temp_c > 35 or temp_c < 0 or wind_kph > 50 }}"

[widget]
template = '{% if location %}{{ location }}  {% endif %}{{ desc }}  {{ temp_c }}°C ({{ feels_like_c }}°C)  humidity {{ humidity }}%'

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
