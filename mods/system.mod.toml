name = "System"
description = "CPU, memory, and temperature"
icon = "cpu"

[source]
type = "native"
kind = "system"
interval = 5

[badges.default]
template = '{{ "cpu" | icon }}'
condition = "{{ cpu_percent > 90 or temp > 90 }}"

[widget]
template = '{{ "cpu" | icon }} {{ cpu_percent }}%|||{{ "memory" | icon }} {{ mem_used_bytes | human_bytes }}/{{ mem_total_bytes | human_bytes }}{% if swap_used_bytes > 0 %}|||{{ "swap-space" | icon }} {{ swap_used_bytes | human_bytes }}/{{ swap_total_bytes | human_bytes }}{% endif %}{% if temp %}|||{{ temp_icon | icon }} {{ temp }}°C{% endif %}|||{{ "gauge" | icon }} {{ load }}'

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
