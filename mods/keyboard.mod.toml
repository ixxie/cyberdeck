name = "Keyboard"
icon = "keyboard"
type = "keyboard"

[source]
type = "poll"
command = ["sh", "-c", """
params="${XDG_CACHE_HOME:-$HOME/.cache}/cyberdeck/params/keyboard/params.json"
default=$(jq -r '.default // ""' "$params" 2>/dev/null)
input=$(swaymsg -t get_inputs | jq -r '[.[] | select(.type == "keyboard")] | first')
layout=$(echo "$input" | jq -r '.xkb_active_layout_name // "unknown"')
idx=$(echo "$input" | jq -r '.xkb_active_layout_index // 0')
layouts=$(echo "$input" | jq -c '[.xkb_layout_names[] // empty]')
printf '{"layout":"%s","layout_idx":%s,"layouts":%s,"default":"%s"}' "$layout" "$idx" "$layouts" "$default"
"""]
interval = 5

[badges.default]
template = '{{ "keyboard" | icon }}'
condition = '{{ default != "" and layout != default and layout != "unknown" }}'

[widget]
template = "{{ layout }}"

