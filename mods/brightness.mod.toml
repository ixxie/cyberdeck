name = "Brightness"
icon = "sun"

[source]
type = "native"
kind = "brightness"
interval = 1

[badges.default]
template = '{{ "sun" | icon }}'
condition = "{{ brightness < 30 }}"

[widget]
template = "{{ brightness | meter(max=100, width=20) }}"

[[actions]]
name = "up"
run = "brightnessctl set +10%"
key = "Up"
label = "brighter"

[[actions]]
name = "down"
run = "brightnessctl set 10%-"
key = "Down"
label = "dimmer"

[[hooks]]
condition = '{{ changed(key="brightness") }}'
action = "spotlight"
timeout = 3

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
