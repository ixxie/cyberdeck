name = "Brightness"
icon = "sun"

[source]
type = "native"
kind = "brightness"
interval = 1

[badges.default]
template = '{{ "sun" | icon }}'
condition = "{{ brightness < 30 }}"

[widget]
template = "{{ brightness | meter(max=100, width=20) }}"

[commands]
up = "brightnessctl set +10%"
down = "brightnessctl set 10%-"

[[hooks]]
condition = '{{ changed(key="brightness") }}'
action = "spotlight"
timeout = 3

[[key-hints]]
key = "Up"
action = "brightnessctl set +10%"
label = "brighter"

[[key-hints]]
key = "Down"
action = "brightnessctl set 10%-"
label = "dimmer"

[[key-hints]]
key = "Esc"
action = "back"
label = "back"
