name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build

  release:
    if: github.event_name == 'release'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Fetch Phosphor icons
        run: |
          git clone --depth 1 https://github.com/phosphor-icons/core.git /tmp/phosphor
          mkdir -p staging/icons
          for weight in regular bold thin light fill duotone; do
            if [ -d "/tmp/phosphor/assets/$weight" ]; then
              cp -r "/tmp/phosphor/assets/$weight" "staging/icons/$weight"
            fi
          done

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/cyberdeck staging/cyberdeck
          cp cyberdeck.service staging/cyberdeck.service
          cp install.sh staging/install.sh
          cd staging
          tar czf ../cyberdeck-${{ matrix.arch }}-linux.tar.gz cyberdeck cyberdeck.service install.sh icons/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cyberdeck-${{ matrix.arch }}-linux.tar.gz
